# AUTHORED, NOT ENABLED: even after publication, both scheduled and manual
# runs are job-gated until ENABLE_FRESHNESS_WORKFLOWS is explicitly set true.
# See docs/maintenance/runbook.md for opt-in and disable steps.
# Automation only opens triage issues; bots never set verdicts or edit rules.
name: release-watch

on:
  workflow_dispatch: {}
  schedule:
    - cron: "17 6 * * 1" # weekly, Monday 06:17 UTC

permissions:
  issues: write
  contents: read

defaults:
  run:
    shell: bash

jobs:
  watch:
    if: vars.ENABLE_FRESHNESS_WORKFLOWS == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: diff npm dist-tags against freshness/last-seen.json
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tmp_dir=$(mktemp -d)
          trap 'rm -rf "$tmp_dir"' EXIT
          issues_file="$tmp_dir/open-issues.json"

          jq -e 'type == "object" and (.packages | type == "object")' \
            freshness/last-seen.json > /dev/null
          gh issue list --state open --limit 1000 --json title > "$issues_file"
          jq -e 'type == "array" and all(.[]; .title | type == "string")' \
            "$issues_file" > /dev/null

          check() {
            pkg="$1"
            tag="$2"
            notes="$3"
            encoded=$(printf '%s' "$pkg" | sed 's|/|%2F|')
            registry_file=$(mktemp "$tmp_dir/registry.XXXXXX.json")
            curl --fail --silent --show-error \
              -H 'Accept: application/vnd.npm.install-v1+json' \
              "https://registry.npmjs.org/$encoded" \
              --output "$registry_file"
            jq -e 'type == "object" and (."dist-tags" | type == "object")' \
              "$registry_file" > /dev/null
            latest=$(jq -er --arg tag "$tag" \
              '."dist-tags"[$tag] | strings | select(length > 0)' \
              "$registry_file")
            seen=$(jq -er --arg pkg "$pkg" \
              '.packages[$pkg].version | strings | select(length > 0)' \
              freshness/last-seen.json)
            if [ "$latest" != "$seen" ]; then
              title="release-watch: $pkg $tag moved $seen -> $latest"
              if jq -e --arg title "$title" \
                'any(.[]; .title == $title)' "$issues_file" > /dev/null; then
                echo "open triage issue already exists: $title"
              else
                gh issue create \
                  --title "$title" \
                  --body "Detected by release-watch. Re-verify affected rules against the new version, then update tested_versions and freshness/last-seen.json. Release notes: $notes. For @openai/codex use the GitHub release body, not CHANGELOG.md. No rule is edited and no verdict is set by automation."
              fi
            fi
          }
          # Watch exactly these tags: stable for claude-code (not latest or
          # next), latest for codex (ignore its other dist-tags and filter
          # -alpha. if releases.atom is ever used), and latest for copilot
          # (not prerelease).
          check "@anthropic-ai/claude-code" "stable" \
            "https://github.com/anthropics/claude-code/releases"
          check "@openai/codex" "latest" \
            "https://github.com/openai/codex/releases"
          check "@github/copilot" "latest" \
            "https://www.npmjs.com/package/@github/copilot"
